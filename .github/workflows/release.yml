name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            cargo-args: "--no-default-features"
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            cargo-args: "--no-default-features"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            cargo-args: "--no-default-features"
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ${{ matrix.use-cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} ${{ matrix.cargo-args }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          dir="esk-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/esk" "$dir/"
          tar czf "$dir.tar.gz" "$dir"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "esk-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target/${{ matrix.target }}/release/esk.exe" "$dir/"
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: esk-${{ matrix.target }}
          path: esk-${{ matrix.target }}.*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/* --generate-notes
