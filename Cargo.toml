[package]
name = "lockbox"
version = "0.1.0"
edition = "2021"
description = "Encrypted secrets management with multi-target sync"

[dependencies]
aes-gcm = "0.10"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
console = "0.15"
dialoguer = "0.11"
hex = "0.4"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
tempfile = "3"
thiserror = "1"
zeroize = { version = "1", features = ["derive"] }
